# Repository registry for Hermes GitHub Autopilot.
# Keep this file declarative: the runner reads policy here, mutable run state lives elsewhere.
version: 1
repos:
  - slug: Percy2Live/ioBroker.bluetti
    autonomy: L2
    policy: docs/autopilot.md
    branch_prefix: hermes
    max_parallel: 1
    max_ci_fix_attempts: 2
    labels:
      work: auto
      block: blocked
      human: needs-human
      ci_failing: ci-failing
      risks:
        low: risk:low
        medium: risk:medium
        high: risk:high
    commands:
      setup:
        - npm ci
      verify:
        - npm run check
        - npm run lint
        - npm run test
        - npm run build
    merge:
      base: main
      method: squash
      auto_merge_for:
        - risk:low
    ci:
      required_checks:
        - check-and-lint
        - adapter-tests (22.x, ubuntu-latest)
        - adapter-tests (24.x, ubuntu-latest)
    escalation:
      after_failed_ci_fix_attempts: 2
      reasons:
        - unclear acceptance criteria
        - credentials or real BLUETTI account required
        - live ioBroker instance or production operation required
        - security/auth/release impact
        - CI still red after retry budget
