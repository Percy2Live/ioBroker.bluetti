version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
    assignees:
      - Percy2Live
    versioning-strategy: increase
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
    assignees:
      - Percy2Live
